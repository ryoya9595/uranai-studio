<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星詠ノ書 — 体験期間終了のご案内（表示イメージ）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="stars"></canvas>
<div class="grain" aria-hidden="true"></div>

<section id="screen-expired" class="screen active">
  <div class="expired-wrap">
    <div class="title-ornament-top"></div>
    <p class="section-kicker">— 体験期間の満了 —</p>
    <h2 class="expired-title">体験期間が<br>終了しました</h2>
    <div class="expired-seal">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="72" height="72">
        <defs>
          <filter id="seal-rough"><feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="2" result="n"/>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/></filter>
        </defs>
        <g filter="url(#seal-rough)">
          <rect x="6" y="6" width="88" height="88" rx="9" fill="none" stroke="#b23a2e" stroke-width="4.5"/>
          <line x1="50" y1="12" x2="50" y2="88" stroke="#b23a2e" stroke-width="2"/>
          <line x1="12" y1="50" x2="88" y2="50" stroke="#b23a2e" stroke-width="2"/>
          <text x="31" y="33" fill="#b23a2e" font-size="29" font-weight="700" text-anchor="middle" dominant-baseline="central" font-family="'Shippori Mincho B1',serif">星</text>
          <text x="69" y="33" fill="#b23a2e" font-size="29" font-weight="700" text-anchor="middle" dominant-baseline="central" font-family="'Shippori Mincho B1',serif">詠</text>
          <text x="31" y="68" fill="#b23a2e" font-size="29" font-weight="700" text-anchor="middle" dominant-baseline="central" font-family="'Shippori Mincho B1',serif">之</text>
          <text x="69" y="68" fill="#b23a2e" font-size="29" font-weight="700" text-anchor="middle" dominant-baseline="central" font-family="'Shippori Mincho B1',serif">印</text>
        </g>
      </svg>
    </div>
    <p class="expired-lead">
      星詠ノ書をお楽しみいただき、ありがとうございました。<br>
      このツールは、AIエージェント（Claude Code など）を使えば、<br>
      特別な知識がなくても、あなた自身の手で作ることができます。
    </p>
    <p class="expired-sub">
      宜しければ、AIを活用してご自身のツール作成に<br>挑戦されてみてください。作り方をご用意しました。
    </p>
    <a href="guide.html" class="btn-primary expired-btn">ツールの作り方を見る</a>
    <p class="expired-note">HOSHIYOMI — AI FORTUNE ATELIER</p>
  </div>
</section>

<script>
/* 星空背景（このページ単体で完結する簡易版） */
(function () {
  const canvas = document.getElementById("stars");
  const ctx = canvas.getContext("2d");
  let stars = [], w, h;
  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    stars = Array.from({ length: Math.floor((w * h) / 9000) }, () => ({
      x: Math.random() * w, y: Math.random() * h,
      r: Math.random() * 1.3 + 0.2,
      tw: Math.random() * Math.PI * 2,
      sp: 0.004 + Math.random() * 0.012,
      drift: 0.02 + Math.random() * 0.05,
    }));
  }
  function frame() {
    ctx.clearRect(0, 0, w, h);
    for (const s of stars) {
      s.tw += s.sp; s.y -= s.drift;
      if (s.y < -2) { s.y = h + 2; s.x = Math.random() * w; }
      const a = 0.25 + Math.abs(Math.sin(s.tw)) * 0.6;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.r > 1.1 ? `rgba(233,211,160,${a})` : `rgba(190,200,230,${a * 0.8})`;
      ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  window.addEventListener("resize", resize);
  resize(); frame();
})();
</script>
</body>
</html>
